; PlatformIO project configuration — LED Necklace firmware
;
; Two environments:
;   seeed_xiao_esp32c3 — the real target (Arduino framework, NimBLE + FastLED).
;   native             — host build for Unity unit tests. The portable engine in
;                        lib/ (seq, effects, player) compiles here with no hardware.
;
; See firmware/README.md for build/test commands and pin notes.

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED
    h2zero/NimBLE-Arduino
build_flags = -DLED_PIN=21 -DBUTTON_PIN=4

[env:native]
platform = native
test_framework = unity
build_flags = -DNATIVE -std=gnu++17
